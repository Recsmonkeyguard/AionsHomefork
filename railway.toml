# Railway 部署配置 — AionsHome VV 定制版

[build]
builder = "nixpacks"
buildCommand = "cp -r ../public ./public && pip install --quiet ./pyncm-1.8.1-py3-none-any.whl"

[deploy]
startCommand = "python main.py"
healthcheckPath = "/"
restartPolicyType = "always"

# ── 部署前在 Railway Dashboard 设置 ──
# 1. Root Directory → aion-chat/
# 2. Volumes → 挂载 /app/aion-chat/data/
#    （首次部署前完成，否则数据不持久化）
