<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aion — 访问验证</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", sans-serif;
  background: #fff9f5;
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
}
.card {
  background: #fff; border-radius: 16px; padding: 40px 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,.06);
  width: 340px; max-width: 90vw; text-align: center;
}
.card h2 { font-size:20px; color:#4a3b32; margin-bottom:8px; }
.card p  { font-size:14px; color:#8a7b72; margin-bottom:24px; }
.card input {
  width:100%; padding:12px; border:1px solid #f0e4dd; border-radius:8px;
  font-size:16px; margin-bottom:16px; outline:none; font-family:monospace;
}
.card input:focus { border-color:#ff8359; }
.card button {
  width:100%; padding:12px; background:#ff8359; color:#fff;
  border:none; border-radius:8px; font-size:16px; cursor:pointer;
}
.card .err { color:#cf222e; font-size:13px; margin-top:8px; display:none; }
</style>
</head>
<body>
<div class="card">
  <h2>Aion</h2>
  <p>请输入访问密码</p>
  <input type="password" id="pwd" placeholder="密码..." autofocus>
  <button onclick="login()">验证</button>
  <div class="err" id="err">密码错误</div>
</div>
<script>
var _busy = false;
async function login() {
  if (_busy) return;
  const el = document.getElementById('pwd');
  const pwd = el.value.trim();
  if (!pwd) return;
  _busy = true;
  try {
    const test = await fetch('/api/models', { headers: { 'Authorization': 'Bearer ' + pwd } });
    if (test.ok) {
      localStorage.setItem('aion_token', pwd);
      const next = new URLSearchParams(window.location.search).get('next') || '/';
      window.location.href = next;
    } else {
      document.getElementById('err').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('err').textContent = '网络错误: ' + e.message;
    document.getElementById('err').style.display = 'block';
  }
  _busy = false;
  el.value = '';
}
document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
